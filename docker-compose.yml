services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/smarrerof/qbittorrent-dashboard:latest
    env_file: .env
    command: python -m collector.main
    volumes:
      - ./data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
